# 开发环境配置
app:
  prefix: "/api"
  port: 8081
  logger:
    # 项目日志存储路径，相对路径（相对本项目根目录）或绝对路径
    dir: "../logs"
  # 文件相关
  file:
    # location 文件上传后存储目录，相对路径（相对本项目根目录）或绝对路径
    location: "../upload"
    # 文件服务器地址，这是开发环境的配置 生产环境请自行配置成可访问域名
    domain: "http://localhost:8081"
    # 文件虚拟路径, 必须以 / 开头， 如 http://localhost:8081/static/****.jpg  , 如果不需要则 设置 ''
    serveRoot: "/static"
# 数据库配置
db:
  mysql:
    host: "localhost"
    username: "root"
    password: "bihongbin"
    database: "kapok"
    port: 3306
    charset: "utf8mb4"
    logger: "advanced-console"
    logging: true
    multipleStatements: true
    dropSchema: false
    synchronize: true
    supportBigNumbers: true
    bigNumberStrings: true

# redis 配置
redis:
  host: "localhost"
  port: 6379
  db: 0
  keyPrefix: "nest:"

# jwt 配置
jwt:
  secretkey: "zANDwNQVFzxlfG9myPxVWAkq4iXJEPhI"
  expiresin: "1h"
  refreshExpiresIn: "2h"
# 权限 白名单配置
perm:
  router:
    whitelist:
      [
        { path: "/api/register", method: "POST" },
        { path: "/api/login", method: "POST" },
        { path: "/api/perm/:id", method: "GET" },
        { path: "/api/oss/upload", method: "POST" },
      ]

# 用户相关
# 初始密码， 重置密码
user:
  initialPassword: "Q123456"

# 企业级双轨制 RAG 与大模型基础设施配置
ai:
  llm:
    apiKey: "sk-cp-4h_g1HgZqcJvjxdVXnwIe-9pAOLULKOngqby9aZi39xq1KiRk8-Y7HkBG-MP-8fiISB3upivOD5Q1IMRo5w-9ua5h4iyT0llnX2cCQYTQo5yBp3znQWeMnM"                  # API Key
    baseURL: "https://api.minimaxi.com/v1" # OneAPI 的地址
    chatModel: "MiniMax-Text-01"           # 对话模型（流式响应）
    embeddingModel: "embo-01"              # 向量模型（MiniMax 私有协议，POST /v1/embeddings 接收 texts+type）
    temperature: 0.2                       # 降低温度以保证知识库回答的严谨性
  qdrant:
    url: "http://localhost:6333"           # Qdrant 向量数据库的物理连接地址
    collectionName: "rag_demo_collection"  # 统一管理的非结构化向量空间名称
