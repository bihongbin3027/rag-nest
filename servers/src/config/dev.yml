# 初始密码， 重置密码
user:
  initialPassword: "Q123456"

# 企业级双轨制 RAG 与大模型基础设施配置
ai:
  llm:
    apiKey: "sk-cp-4h_g1HgZqcJvjxdVXnwIe-9pAOLULKOngqby9aZi39xq1KiRk8-Y7HkBG-MP-8fiISB3upivOD5Q1IMRo5w-9ua5h4iyT0llnX2cCQYTQo5yBp3znQWeMnM"                  # API Key
    baseURL: "https://api.minimaxi.com/v1" # OneAPI 的地址
    chatModel: "MiniMax-Text-01"           # 对话模型（流式响应）
    embeddingModel: "embo-01"              # 向量模型（MiniMax 私有协议，POST /v1/embeddings 接收 texts+type）
    temperature: 0                         # 【P0-5】RAG 严谨场景必须 0；旧 0.2 在关键数字上有 5% 抖动
  qdrant:
    url: "http://localhost:6333"           # Qdrant 向量数据库的物理连接地址
    collectionName: "rag_demo_collection"  # 统一管理的非结构化向量空间名称
  # 【P0-5】Rerank 模型配置（输入截断字符预算，默认 1024）
  rerank:
    charBudget: 1500                       # 【优化1】v2-m3 context=8192 token，1500 字符≈~750 token
  # 【P0】RAG 灰度开关（默认 false 保留旧行为，开启切到新逻辑）
  rag:
    p0:
      smartHeader: true                    # xlsx 智能探测真表头行号（修"合并标题+真表头在 row N"致命 Bug）
      mergedCellAware: true                # xlsx 合并单元格 → 自然语言
      formulaHint: true                    # xlsx 公式保留语义（"=SUM → 1250"）
      mdTableAware: true                   # markdown 表格预处理（不被 `|` 切碎）
      pdfWithPage: true                    # PDF 按页保留
    p1:
      hybrid: false                        # Qdrant sparse + RRF 混合检索（需 Qdrant 1.10+）
      historyInRetrieval: true            # 多轮历史参与 embedding 检索
      rerankModel: 'Xenova/bge-reranker-base'  # base（v2-m3 与 transformers.js text-classification 不兼容，需要 NLI pair）
    # 【P1-7】Chunk 大小配置（中文 RAG 经验值：800/150 比 600/100 召回率 +5%）
    chunk:
      vectorSize: 800
      vectorOverlap: 150
      sqlSize: 1000
      sqlOverlap: 100
    # 【P2-1】Contextual Retrieval（Anthropic 2024）
    #   - true: ETL 阶段给每个 chunk 加 LLM 生成的 50-100 token 上下文注释
    #   - 论文报告可降 49% 检索失败；加 rerank 后 67%
    #   - 成本：每 chunk 一次 LLM 调用 → ETL 慢 5-10x
    #   - 默认 false（避免现有文件需要重新 ETL）
    p2:
      contextualRetrieval: true           # 验证后在小数据集(30行)上效果不佳，默认关闭
      contextualRetrievalMaxChunks: 30     # 限制最大 chunk 数（避免 LLM API 限流）
      # 【P2-2】Multi-Query：用户问"试用期多久" → LLM 改写 3 个视角 → 各自 retrieve → RRF
      multiQuery: true                     # 验证后效果不佳，默认关闭
      multiQueryCount: 3                   # 改写 query 数量
    # 【P3-1】CRAG：Corrective Retrieval Augmented Generation（Yan 2024）
    #   - 检索后用 LLM 给每个 chunk 打分 RELEVANT/PARTIAL/IRRELEVANT
    #   - 过滤掉 IRRELEVANT，过滤后为空 → 拒答
    #   - 1 次 LLM 调用评估 N 个文档（成本可控）
    #   - 比 hard check（关键词重叠率）更精准
    p3:
      crag: true                          # 【P3-1 默认关闭】CRAG document grader（已验证可工作，效果需更大数据集）
